<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - OAS4X</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <header>
        <h1>OAS4X API-WEB</h1>
        <nav>
            <a href="/">Início</a>
            <a href="/acquisition">Acquisition</a>
            <a href="/files">Files</a>
            <a href="/monitor">Monitor</a>
            <a href="/espectro">Espectro</a>
            <a href="/health-page">Health</a>
            <a href="/analysis">Analysis</a>
            <a href="/calibration">Calibration</a>
        </nav>
    </header>
    <main>
        <h2>Monitor em tempo real</h2>
        <p>Selecione o sensor e inicie o monitor para ver a tensão dos dois canais e a tensão diferencial (útil para regular a potência do laser). Atualização ~10 Hz.</p>
        <div class="form-group">
            <label>Sensor</label>
            <select id="sensor-select">
                <option value="S1">S1 (CH0, CH1)</option>
                <option value="S2">S2 (CH2, CH3)</option>
                <option value="S3">S3 (CH4, CH5)</option>
                <option value="S4">S4 (CH6, CH7)</option>
            </select>
        </div>
        <div class="form-group">
            <button id="btn-start-monitor">Iniciar monitor</button>
            <button id="btn-stop-monitor" class="danger" disabled>Parar monitor</button>
        </div>
        <p id="monitor-status-msg"></p>
        <div id="monitor-plot-container"></div>
    </main>
    <script src="/static/js/monitor.js"></script>
</body>
</html>
