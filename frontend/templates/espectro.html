<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espectro - OAS4X</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <header>
        <h1>OAS4X API-WEB</h1>
        <nav>
            <a href="/">Início</a>
            <a href="/acquisition">Acquisition</a>
            <a href="/files">Files</a>
            <a href="/monitor">Monitor</a>
            <a href="/espectro">Espectro</a>
            <a href="/health-page">Health</a>
            <a href="/analysis">Analysis</a>
            <a href="/calibration">Calibration</a>
        </nav>
    </header>
    <main>
        <h2>Espectro em tempo real</h2>
        <p>O intervalo de coleta define a resolução em frequência e a taxa de atualização. Maior intervalo permite ver frequências mais baixas.</p>
        <div class="form-group">
            <label>Sensor</label>
            <select id="spectrum-sensor">
                <option value="S1">S1 (CH0, CH1)</option>
                <option value="S2">S2 (CH2, CH3)</option>
                <option value="S3">S3 (CH4, CH5)</option>
                <option value="S4">S4 (CH6, CH7)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Intervalo de coleta (s)</label>
            <select id="spectrum-interval">
                <option value="0.1">0,1</option>
                <option value="0.2">0,2</option>
                <option value="0.5" selected>0,5</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="5">5</option>
            </select>
        </div>
        <div class="form-group">
            <label>Taxa de amostragem</label>
            <span id="spectrum-rate-display">200000 Hz</span>
        </div>
        <div class="form-group">
            <button id="btn-start-spectrum">Iniciar</button>
            <button id="btn-stop-spectrum" class="danger" disabled>Parar</button>
        </div>
        <p id="spectrum-status-msg"></p>
        <p id="spectrum-info"></p>
        <div id="spectrum-plot-container" style="min-height: 450px;"></div>
    </main>
    <script src="/static/js/spectrum.js"></script>
</body>
</html>
